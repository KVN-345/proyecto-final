<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Talleres</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <!-- Barra de navegación -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Talleres</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link active" href="#" onclick="showView('student')">Estudiante</a></li>
          <li class="nav-item"><a class="nav-link" href="#" onclick="showView('admin')">Administración</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Contenedor principal -->
  <div class="container mt-4">
    <!-- Vista Estudiante -->
    <div id="studentView">
      <h2>Lista de Talleres</h2>
      <div id="workshopsList" class="row"></div>
    </div>

    <!-- Vista Administrador -->
    <div id="adminView" class="d-none">
      <h2>Panel de Administración</h2>
      <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#newWorkshopModal">Nuevo Taller</button>
      <table class="table table-striped">
        <thead>
          <tr>
            <th>Nombre</th><th>Fecha</th><th>Hora</th><th>Lugar</th><th>Categoría</th><th>Acciones</th>
          </tr>
        </thead>
        <tbody id="adminWorkshops"></tbody>
      </table>
    </div>
  </div>

  <!-- Modal Inscripción -->
  <div class="modal fade" id="registerModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Inscribirse al Taller</h5></div>
        <div class="modal-body">
          <form id="registerForm">
            <input type="hidden" id="registerWorkshopId">
            <div class="mb-3">
              <label for="studentName" class="form-label">Nombre del Estudiante</label>
              <input type="text" id="studentName" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success">Inscribirse</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Nuevo Taller -->
  <div class="modal fade" id="newWorkshopModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Nuevo Taller</h5></div>
        <div class="modal-body">
          <form id="newWorkshopForm">
            <div class="mb-3"><input type="text" id="name" class="form-control" placeholder="Nombre" required></div>
            <div class="mb-3"><textarea id="description" class="form-control" placeholder="Descripción" required></textarea></div>
            <div class="mb-3"><input type="date" id="date" class="form-control" required></div>
            <div class="mb-3"><input type="time" id="time" class="form-control" required></div>
            <div class="mb-3"><input type="text" id="place" class="form-control" placeholder="Lugar" required></div>
            <div class="mb-3"><input type="text" id="category" class="form-control" placeholder="Categoría" required></div>
            <button type="submit" class="btn btn-primary">Registrar Taller</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
